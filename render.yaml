services:
  - type: web
    name: insiders-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: SPORTS_API_PROVIDER
        sync: false
      - key: ODDS_PROVIDER
        sync: false
      - key: SPORTSGAMEODDS_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
